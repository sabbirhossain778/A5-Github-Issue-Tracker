<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#F8FAFC]">
    <section id="navbar" class="mb-6 md:mb-[60px]">
        <div class="navbar bg-base-100 shadow-sm flex flex-col md:flex-row justify-between px-4 md:px-10 py-4 md:py-2 gap-4">
            <div id="nav-left" class="flex gap-2 items-center">
                <img src="assets/github-logo.png" class="w-8 md:w-9" alt="Logo">
                <h3 class="font-semibold text-lg md:text-xl text-[#1F2937]">GitHub Issues Tracker</h3>
            </div>
            <div id="nav-right" class="flex items-center gap-2 w-full md:w-auto">
                <label class="input input-bordered flex items-center gap-2 grow md:w-64 h-10 md:h-12">
                    <input id="input-search" type="search" class="grow" placeholder="Search issues..." />
                </label>
                <div class="btn btn-primary text-white h-10 md:h-12 flex items-center gap-2">
                    <i class="fa-regular fa-plus text-lg"></i>
                    <span class="hidden sm:inline">New Issue</span>
                </div>
            </div>
        </div>
    </section>

    <section id="btn-section">
        <div class="w-11/12 mx-auto flex flex-wrap gap-2 md:gap-4 p-4 md:p-6 bg-base-100 shadow-sm rounded-lg justify-center md:justify-start">
            <button onclick="handleActive(this)" id="all-btn" class="btn btn-sm md:btn-md btn-outline btn-primary btn-active">All</button>
            <button onclick="handleActive(this)" id="open-btn" class="btn btn-sm md:btn-md btn-outline btn-primary">Open</button>
            <button onclick="handleActive(this)" id="closed-btn" class="btn btn-sm md:btn-md btn-outline btn-primary">Closed</button>
        </div>
    </section>

    <section id="issues-section" class="w-11/12 mx-auto mt-6 flex flex-col md:flex-row justify-between p-4 md:p-6 bg-base-100 shadow-sm rounded-lg gap-4">
        <div class="flex items-center gap-4">
            <img src="assets/Aperture.png" class="w-10 md:w-12" alt="">
            <div>
                <h4 class="text-lg md:text-xl font-semibold text-[#1F2937]"><span id="issue-count">0</span> Issues</h4>
                <p class="text-sm md:text-base text-[#64748B]">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex gap-4 items-center text-sm md:text-base">
            <p class="flex items-center gap-2"><span class="w-3 h-3 bg-[#00A96E] rounded-full"></span>open</p>
            <p class="flex items-center gap-2"><span class="w-3 h-3 bg-[#A855F7] rounded-full"></span>closed</p>
        </div>
    </section>

    <section id="spinner" class="flex justify-center my-10 hidden">
        <span class="loading loading-spinner loading-lg text-primary"></span>
    </section>

    <section id="card-container" class="bg-gray-100 p-4 md:p-8 w-11/12 mx-auto mt-6 rounded-lg shadow-sm grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
    </section>

   <dialog id="my_modal" class="modal modal-middle">
        <div class="modal-box w-[90%] max-w-md md:max-w-lg rounded-2xl shadow-xl p-6">
        <div id="details_container">
            </div>

        <div class="modal-action flex justify-end mt-4">
            <form method="dialog">
                <button class="btn btn-primary btn-sm px-6">Close</button>
            </form>
        </div>
        </div>
    
        <form method="dialog" class="modal-backdrop">
        <button>close</button>
        </form>
    </dialog>
    <script src="./script/home.js"></script>
</body>
</html>
